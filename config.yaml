# ============================================================
# LHCII Zeno Threshold Project — Master Configuration
# OSF pre-registration DOI: [PASTE YOUR DOI HERE]
# ============================================================

# ── Hamiltonian ──────────────────────────────────────────────
hamiltonian:
  source_file: "results/lhcii_hamiltonian_mueh2010.h5"
  robustness_file: "results/lhcii_hamiltonian_novo2011.h5"
  n_sites: 14

# ── Source / Sink (Excitation Drive) ─────────────────────────
# These create the non-equilibrium steady state.
# Without them, pure dephasing gives the maximally mixed state
# (IPR = 1/14 = 0.0714) regardless of gamma — that is the bug.
source_sink:
  source_site: 12        # b601 (0-indexed, Müh 2010 ordering)
  sink_site: 8           # a610 (0-indexed, Müh 2010 ordering)
  kappa_in_cm1: 10.0     # pumping rate into b601 (cm^-1)
  kappa_out_cm1: 100.0   # trapping rate from a610 (cm^-1)

# ── Parameter Sweep ──────────────────────────────────────────
sweep:
  gamma_min_cm1: 1.0       # lower bound of dephasing sweep (cm^-1)
  gamma_max_cm1: 10000.0   # upper bound of dephasing sweep (cm^-1)
  n_gamma: 80              # number of log-spaced gamma points
  sigma_values_cm1:        # static disorder strengths to test
    - 0
    - 50
    - 100
    - 150
    - 200
  n_realizations: 200      # disorder realizations per (gamma, sigma) pair
  geometries:
    - symmetric            # full trimeric coupling
    - disordered_monomer   # reduced inter-subunit couplings

# ── Dimer Validation (Week 1) ────────────────────────────────
dimer:
  eps1_cm1: 100.0   # site energy 1 (relative to mean)
  eps2_cm1: 0.0     # site energy 2
  J_cm1: 100.0      # coupling constant
  gamma_sweep_min: 0.001   # ps^-1
  gamma_sweep_max: 100.0   # ps^-1
  n_gamma_dimer: 50

# ── Simulation Settings ──────────────────────────────────────
simulation:
  steadystate_method: "direct"  # "direct" or "iterative-gmres"
  tmax_ps: 20.0                 # max time for mesolve fallback (ps)
  n_timesteps: 500
  convergence_tol: 1.0e-6

# ── Threshold Extraction (Week 6) ───────────────────────────
threshold:
  sigmoid_p0: [0.9, 2.0, 2.0, 0.07]  # [A, k, log_gamma_c, B] initial guess
  maxfev: 10000
  ci_level: 0.95
  n_bootstrap: 1000

# ── Figure Settings ─────────────────────────────────────────
figures:
  dpi: 300
  font_size: 11
  font_family: "DejaVu Sans"   # Arial needs system install; DejaVu is Colab-safe
  line_width: 1.4
  output_formats: ["png", "svg"]
